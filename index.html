<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple drag-and-drop kanban board to organize your tasks."
    />
    <meta name="keywords" content="kanban, task manager, todo, productivity" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Simple Kanban Board</h1>
      <div class="board">
        <!-- list 1 -->
        <div class="list" id="list1">
          <h2>To Do (<span class="count"></span>)</h2>
          <div class="cards-container">
            <div class="card" draggable="true" id="card1">
              <span class="card-text" contenteditable="true"
                >Watch tutorials</span
              >
              <button class="delete-btn">✕</button>
            </div>
            <div class="card" draggable="true" id="card2">
              <span class="card-text" contenteditable="true"
                >Practice projects</span
              >
              <button class="delete-btn">✕</button>
            </div>
            <div class="card" draggable="true" id="card3">
              <span class="card-text" contenteditable="true">Learn JS</span>
              <button class="delete-btn">✕</button>
            </div>
            <div class="card" draggable="true" id="card4">
              <span class="card-text" contenteditable="true">Write code</span>
              <button class="delete-btn">✕</button>
            </div>
          </div>
          <div class="buttons">
            <button class="add-btn" onclick="addCard('list1')">
              + Add new
            </button>
            <button class="clear-btn" onclick="clearAll('list1')">
              Clear all x
            </button>
          </div>
        </div>

        <!-- list 2 -->
        <div class="list" id="list2">
          <h2>In Progress (<span class="count"></span>)</h2>
          <div class="cards-container">
            <div class="card" draggable="true" id="card5">
              <span class="card-text" contenteditable="true"
                >Learn to code</span
              >
              <button class="delete-btn">✕</button>
            </div>
          </div>
          <div class="buttons">
            <button class="add-btn" onclick="addCard('list2')">
              + Add new
            </button>
            <button class="clear-btn" onclick="clearAll('list2')">
              Clear all x
            </button>
          </div>
        </div>

        <!-- list 3 -->
        <div class="list" id="list3">
          <h2>Done (<span class="count"></span>)</h2>
          <div class="cards-container"></div>
          <div class="buttons">
            <button class="add-btn" onclick="addCard('list3')">
              + Add new
            </button>
            <button class="clear-btn" onclick="clearAll('list3')">
              Clear all x
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="/script.js"></script>
  </body>
</html>
